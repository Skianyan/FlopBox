<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FlopBox</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <div class="logo">
            <img class="logoimg" src="/static/images/flopbo.png" alt="Logo" class="logo">
            <h1>FlopBox</h1>
        </div>
        
        <p>Sube tu archivo y genera un enlace de descarga</p>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button class="upload" type="submit">Subir archivo</button>
        </form>
    </div>

</body>
</html>
